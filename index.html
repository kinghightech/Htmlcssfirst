<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapLock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 40px;
      letter-spacing: -1px;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 24px 16px;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #fff;
      background-color:aqua;
      padding: 4px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#download">Download</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
  <div class="container">
    <div class="logo">TapLock</div>
  </div>
  
</body>
</html>
